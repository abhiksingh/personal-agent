name: Harness

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: harness-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  harness:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: source/services/daemon-go/go.mod
          cache: true
          cache-dependency-path: |
            source/services/daemon-go/go.sum
            source/clients/cli-go/go.sum

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq ripgrep

      - name: Install Go security tools
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run harness
        run: tools/scripts/check_harness.sh

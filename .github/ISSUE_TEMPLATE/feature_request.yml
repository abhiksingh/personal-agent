name: Feature request
description: Propose a new capability or an improvement to an existing one.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operator or user problem should this solve?
      placeholder: It is hard to understand which connector failed first during a multi-step task.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the change at the behavior level.
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why this matters
      description: Explain the expected impact on clarity, reliability, or usability.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Out of scope
      description: Call out anything this request should intentionally not include.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

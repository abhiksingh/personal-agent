name: PersonalAgent
options:
  minimumXcodeGenVersion: 2.44.1
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: "14.0"
packages:
  PersonalAgentUIV2:
    path: Packages/PersonalAgentUIV2
targets:
  PersonalAgentV2:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - AppHost/Sources
      - path: AppHost/Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: PersonalAgent
        PRODUCT_BUNDLE_IDENTIFIER: com.personalagent.app.v2
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Personal Agent
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGNING_ALLOWED: NO
    dependencies:
      - package: PersonalAgentUIV2
        product: PersonalAgentUIV2
schemes:
  PersonalAgent:
    build:
      targets:
        PersonalAgentV2: all
    run:
      config: Debug

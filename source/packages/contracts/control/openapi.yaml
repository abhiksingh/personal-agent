openapi: 3.1.0
info:
  title: Personal Agent Control API
  version: 0.3.0
  description: |
    Control-plane contract for daemon clients.
    Unknown `/v1/*` routes return `404` problem+json envelopes with correlation headers.
servers:
  - url: http://127.0.0.1:7071
    description: Localhost TCP default binding
security:
  - bearerAuth: []
paths:
  /v1/tasks:
    post:
      operationId: submitTask
      summary: Submit a task.
      parameters:
        - $ref: '#/components/parameters/CorrelationID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskSubmitRequest'
      responses:
        '202':
          description: Accepted JSON response.
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationID'

            X-PersonalAgent-API-Version:
              $ref: '#/components/headers/APIVersion'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskSubmitResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/tasks/list:
    post:
      operationId: taskRunList
      summary: List task/run rows for UI tasks panel.
      parameters:
        - $ref: '#/components/parameters/CorrelationID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskRunListRequest'
      responses:
        '200':
          description: Successful JSON response.
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationID'

            X-PersonalAgent-API-Version:
              $ref: '#/components/headers/APIVersion'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskRunListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '501':
          $ref: '#/components/responses/NotImplemented'
  /v1/tasks/{task_id}:
    get:
      operationId: getTaskStatus
      summary: Fetch task status.
      parameters:
        - $ref: '#/components/parameters/TaskID'
        - $ref: '#/components/parameters/CorrelationID'
      responses:
        '200':
          description: Successful JSON response.
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationID'

            X-PersonalAgent-API-Version:
              $ref: '#/components/headers/APIVersion'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/tasks/cancel:
    post:
      operationId: cancelTaskRun
      summary: Cancel a queued or running task run.
      parameters:
        - $ref: '#/components/parameters/CorrelationID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCancelRequest'
      responses:
        '200':
          description: Successful JSON response.
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationID'

            X-PersonalAgent-API-Version:
              $ref: '#/components/headers/APIVersion'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCancelResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/tasks/retry:
    post:
      operationId: retryTaskRun
      summary: Retry a failed or cancelled task run as a fresh queued run.
      parameters:
        - $ref: '#/components/parameters/CorrelationID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskRetryRequest'
      responses:
        '200':
          description: Successful JSON response.
          headers:
            X-Correlation-ID:

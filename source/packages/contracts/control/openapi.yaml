components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token
  parameters:
    CorrelationID:
      name: X-Correlation-ID
      in: header
      required: false
      schema:
        type: string
      description: Optional correlation ID propagated across daemon responses/events.
    TaskID:
      name: task_id
      in: path
      required: true
      schema:
        type: string
    WorkspaceID:
      name: workspace_id
      in: path
      required: true
      schema:
        type: string
    SecretName:
      name: name
      in: path
      required: true
      schema:
        type: string
  headers:
    CorrelationID:
      description: Correlation ID associated with this response.
      schema:
        type: string
    APIVersion:
      description: Daemon API contract version served by this endpoint.
      schema:
        type: string
        example: v1
  requestBodies:
    JsonObjectRequired:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/JsonObject'
  responses:
    OKJSON:
      description: Successful JSON response.
      headers:
        X-Correlation-ID:
          $ref: '#/components/headers/CorrelationID'

        X-PersonalAgent-API-Version:
          $ref: '#/components/headers/APIVersion'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/JsonObject'
    AcceptedJSON:
      description: Accepted JSON response.
      headers:
        X-Correlation-ID:
          $ref: '#/components/headers/CorrelationID'

        X-PersonalAgent-API-Version:
          $ref: '#/components/headers/APIVersion'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/JsonObject'
    BadRequest:
      description: Invalid request payload.
      headers:
        X-Correlation-ID:
          $ref: '#/components/headers/CorrelationID'
        X-PersonalAgent-API-Version:
          $ref: '#/components/headers/APIVersion'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid bearer token.
      headers:
        X-Correlation-ID:
          $ref: '#/components/headers/CorrelationID'
        X-PersonalAgent-API-Version:
          $ref: '#/components/headers/APIVersion'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Requested object not found.
      headers:
        X-Correlation-ID:
          $ref: '#/components/headers/CorrelationID'
        X-PersonalAgent-API-Version:
          $ref: '#/components/headers/APIVersion'
      content:
        application/problem+json:
